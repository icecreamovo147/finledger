name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: false

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y webview2-runtime

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg
        if: runner.os == 'macOS'

      - name: Create macOS ZIP
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
            "src-tauri/target/${{ matrix.target }}/release/bundle/FinLedger-${{ matrix.target }}.zip"

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles msi,nsis
        if: runner.os == 'Windows'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finledger-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        run: |
          echo "## FinLedger ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "See the commit log for changes since the last release." >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FinLedger ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            **/*.dmg
            **/*.zip
            **/*.msi
            **/*.exe
          generate_release_notes: true
